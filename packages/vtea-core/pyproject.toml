[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vtea-core"
version = "0.1.0.dev0"
description = "Headless core analysis library for VTEA (Volumetric Tissue Exploration and Analysis) - segmentation, feature extraction, clustering, dimensionality reduction, and gating for 3D tissue cytometry."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "GPL-2.0-only" }
authors = [{ name = "Indiana Center for Biological Microscopy" }]

dependencies = [
    "numpy>=1.24",
    "scipy>=1.11",
    "dask[array]>=2024.1",
    "zarr>=2.16,<3",
    "scikit-image>=0.22",
    "scikit-learn>=1.3",
    "pandas>=2.0",
    "duckdb>=0.10",
    "tifffile>=2024.1",
    "imagecodecs>=2024.1",
    "matplotlib>=3.8",
]

[project.optional-dependencies]
bioformats = ["bioio>=1.0"]
deeplearning = ["torch>=2.1", "cellpose>=3.0"]
dev = ["pytest>=8.0", "pytest-cov", "ruff", "mypy"]

# Entry-point groups mirror the SciJava extension points from the Java
# vtea.services classes (Segmentation, Measurements, GateMath, ...).
# Built-in implementations register into these groups; third-party
# packages can extend VTEA by registering into the same groups.
[project.entry-points."vtea_core.segmentation"]

[project.entry-points."vtea_core.measurements"]

[project.entry-points."vtea_core.clustering"]

[project.entry-points."vtea_core.reduction"]

[tool.hatch.build.targets.wheel]
packages = ["src/vtea_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"
