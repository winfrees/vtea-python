name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install vtea-core
        run: pip install -e "packages/vtea-core[dev]"
      - name: Lint
        run: ruff check packages/vtea-core/src
      - name: Test
        run: pytest packages/vtea-core -v

  test-deeplearning:
    # Separate job (not folded into the test-core matrix) since it needs
    # torch/cellpose, which test-core deliberately doesn't install - most
    # of vtea-core works without them (see vtea_core.classification and
    # vtea_core.segmentation.deep's docstrings on why).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install torch (CPU-only, to keep this job's disk/time footprint down)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install vtea-core with the deeplearning extra
        run: pip install -e "packages/vtea-core[dev,deeplearning]"
      - name: Lint
        run: ruff check packages/vtea-core/src
      - name: Test
        run: pytest packages/vtea-core -v

  test-golden-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install vtea-core
        run: pip install -e "packages/vtea-core[dev]"
      - name: Lint
        run: ruff check tests/golden
      - name: Test
        # Parity tests skip themselves until tests/golden/fixtures/ is
        # populated (see tests/golden/README.md); this still runs the
        # comparison-utility unit tests on every push.
        run: pytest tests/golden -v

  test-napari:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install vtea-core and vtea-napari
        run: |
          pip install -e "packages/vtea-core"
          pip install -e "packages/vtea-napari[dev]"
      - name: Lint
        run: ruff check packages/vtea-napari/src
      - name: Test (headless Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest packages/vtea-napari -v
